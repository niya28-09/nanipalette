<!DOCTYPE html>
<html>
<head>
    <title>Nani Palette</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>✨ Nani Palette</h1>
    <p>Create stunning images using AI for free</p>

    <form method="POST">
        <input type="text" name="prompt" placeholder="Enter your imagination..." required>
        <button type="submit">Generate</button>
    </form>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    {% if image_path %}
        <div class="image-box">
            <img src="{{ image_path }}" alt="Generated Image">
            <a href="{{ image_path }}" download class="download">⬇ Download</a>
        </div>
    {% endif %}

</div>

</body>
</html>
